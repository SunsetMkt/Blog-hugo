# pagefind.yml
# https://pagefind.app/docs/config-sources/
# Pagefind title polyfill
# <span data-pagefind-meta="title" style="display: none;">{{ .Title }}</span>
site: public
output_subdir: pagefind
root_selector: .main-article
force_language: zh-cn
write_playground: true
verbose: true
exclude_selectors:
    - ".lnt" # Line numbers
