{{ $uniqueID := substr (.Get "file" | md5) 0 8 }}
{{ $epubFile := .Get "file" }}


<div>
    <p>
        <code>{{ $epubFile | safeHTML }}</code>
        |
        <a
            href="{{ $epubFile }}"
            id="embed-epub-download-{{ $uniqueID }}"
            download
            >下载EPUB</a
        >
        |
        <a
            href="/tools/foliate-js/reader.html?url="
            target="_blank"
            id="embed-epub-link-{{ $uniqueID }}"
            >在新页面打开</a
        >
    </p>
    <iframe
        src="/tools/foliate-js/reader.html?url="
        style="width: 100%; border: none; overflow: hidden;"
        class="embed-epub-iframe"
        id="embed-epub-iframe-{{ $uniqueID }}"
    ></iframe>
    <style>
        .embed-epub-iframe {
            aspect-ratio: 16/9;
        }

        @media (max-width: 768px) {
            .embed-epub-iframe {
                aspect-ratio: auto;
                height: 60vh;
            }
        }
    </style>
  <script>
    (function () {
      var uniqueID = "{{ $uniqueID }}";
      var filepath = "{{ $epubFile }}";
      var iframe = document.getElementById("embed-epub-iframe-" + uniqueID);
      var link = document.getElementById("embed-epub-link-" + uniqueID);
      var download = document.getElementById("embed-epub-download-" + uniqueID);
      var currentPageLocation = window.location.toString().split('?')[0]?.split('#')[0];
      if (currentPageLocation.endsWith("/") == false) {
        currentPageLocation += "/";
      }
      if (filepath.includes("://")) {
        var src = filepath;
      } else {
        var src = currentPageLocation + filepath;
      }
      var raw_src = src.valueOf();
      src = encodeURI(src);
      var href = "/tools/foliate-js/reader.html?url=" + src;
      iframe.src = href;
      link.href = href;
      // download.href = raw_src;
    })();
  </script>
</div>
