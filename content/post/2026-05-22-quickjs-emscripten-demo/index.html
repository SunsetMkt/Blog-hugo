<style>
    .code-input {
        width: 100%;
        height: 150px;
        font-family: monospace;
    }
    .controls {
        margin: 10px 0;
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .output-box {
        width: 100%;
        display: block;
        padding: 10px;
        background: #222;
        color: #7f7;
        font-family: monospace;
        white-space: pre;
        overflow-x: auto;
        box-sizing: border-box;
    }
    .output-box.error {
        color: #f77;
    }
</style>

<textarea id="code-input" placeholder="Input...">1 + 1;</textarea>

<div class="controls">
    <button id="run-btn" disabled>Run</button>
    <span id="status-text" style="color: #666; font-size: 14px;"
        >Loading WASM...</span
    >
</div>

<div>Output:</div>
<div id="output" class="output-box">Waiting for code execution...</div>

<script type="module">
    import { getQuickJS } from "https://esm.sh/quickjs-emscripten@0.32.0";

    const codeInput = document.getElementById("code-input");
    const runBtn = document.getElementById("run-btn");
    const statusText = document.getElementById("status-text");
    const outputBox = document.getElementById("output");

    let QuickJS = null;

    async function init() {
        try {
            QuickJS = await getQuickJS();
            runBtn.disabled = false;
            statusText.textContent = "🟢 QuickJS Ready";
        } catch (err) {
            statusText.textContent = "🔴 QuickJS Load Failure";
            outputBox.textContent = `Failed to load QuickJS: ${err.message}`;
        }
    }

    function runCode() {
        if (!QuickJS) return;

        const vm = QuickJS.newContext();

        outputBox.classList.remove("error");

        try {
            const result = vm.evalCode(codeInput.value);

            if (result.error) {
                outputBox.classList.add("error");
                const errorDetails = vm.dump(result.error);
                if (errorDetails && typeof errorDetails === "object") {
                    outputBox.textContent = `[QuickJS Exception]\n${errorDetails.name || "Error"}: ${errorDetails.message}\n\nStack:\n${errorDetails.stack || "None"}`;
                } else {
                    outputBox.textContent = `[QuickJS Exception]: ${String(errorDetails)}`;
                }

                result.error.dispose();
                return;
            }

            const val = vm.dump(result.value);

            if (val !== null && typeof val === "object") {
                outputBox.textContent = JSON.stringify(val, null, 2);
            } else {
                outputBox.textContent = String(val);
            }

            result.value.dispose();
        } catch (err) {
            outputBox.classList.add("error");
            outputBox.textContent = `[WASM Exception]: ${err.message}`;
        } finally {
            vm.dispose();
        }
    }

    runBtn.addEventListener("click", runCode);
    init();
</script>
