allowContent = ['.*']
enableInlineShortcodes = true
[exec]
allow = [
    '^(dart-)?sass(-embedded)?$',
    '^go$',
    '^git$',
    '^node$',
    '^postcss$',
    '^tailwindcss$',
]
osEnv = [
    '(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|PROGRAMDATA)$',
]
[funcs]
getenv = ['^HUGO_', '^CI$']
[http]
methods = ['(?i)GET|POST']
urls = [
    '(?i)^https?://[a-z0-9]',
    '! ^https?://\d+\.',
    '! (?i)localhost',
    '! (?i)^https?://[^/?#]*@',
]
[node]
[node.permissions]
allowAddons = ['tailwindcss']
allowChildProcess = ['tailwindcss']
allowRead = ['.']
allowWorker = ['tailwindcss']
allowWrite = []
disable = false
